version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkforge-postgres
    environment:
      POSTGRES_DB: linkforge
      POSTGRES_USER: linkforge
      POSTGRES_PASSWORD: linkforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkforge-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkforge-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://linkforge:linkforge@postgres:5432/linkforge"
      REDIS_URL: "redis://redis:6379"
      PORT: "4000"
      NODE_ENV: "production"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      ANALYTICS_SALT: "${ANALYTICS_SALT}"
      FRONTEND_URL: "http://localhost:5173"
      BASE_URL: "http://localhost:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
